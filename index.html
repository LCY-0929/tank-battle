<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 坦克大战 - Tank Battle</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    user-select: none;
  }
  #gameContainer {
    position: relative;
    border: 3px solid #333;
    border-radius: 8px;
    box-shadow: 0 0 40px rgba(0, 200, 0, 0.3), 0 0 80px rgba(0, 100, 0, 0.2);
  }
  canvas {
    display: block;
    border-radius: 5px;
    background: #111;
  }
  #ui {
    position: absolute;
    top: -45px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #0f0;
    font-size: 14px;
    padding: 0 10px;
  }
  #ui .score { font-size: 18px; font-weight: bold; }
  #ui .lives { color: #f55; }
  #ui .level { color: #ff0; }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.85);
    border-radius: 5px;
    pointer-events: none;
  }
  #overlay.hidden { display: none; }
  #overlay h1 {
    color: #0f0;
    font-size: 42px;
    margin-bottom: 10px;
    text-shadow: 0 0 20px #0f0;
    letter-spacing: 4px;
  }
  #overlay .subtitle { color: #aaa; font-size: 14px; margin-bottom: 30px; }
  #overlay .info { color: #ccc; font-size: 13px; line-height: 2; text-align: center; }
  #overlay .key { color: #ff0; background: #222; padding: 2px 8px; border-radius: 3px; border: 1px solid #444; }
  #overlay .btn {
    margin-top: 25px;
    padding: 12px 40px;
    font-size: 20px;
    font-family: inherit;
    background: #0a0;
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    pointer-events: all;
    letter-spacing: 2px;
    transition: all 0.2s;
  }
  #overlay .btn:hover { background: #0d0; box-shadow: 0 0 20px #0f0; transform: scale(1.05); }
  #overlay .gameover-title { color: #f44; text-shadow: 0 0 20px #f44; }
  .controls-bar {
    position: absolute;
    bottom: -50px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: 30px;
    color: #555;
    font-size: 11px;
  }
  .controls-bar span { color: #888; }
  .controls-bar .k { color: #ff0; }
</style>
</head>
<body>
<div id="gameContainer">
  <div id="ui">
    <span>🏆 <span class="score" id="scoreDisplay">0</span></span>
    <span class="level">📊 关卡 <span id="levelDisplay">1</span></span>
    <span>💀 击杀: <span id="killsDisplay">0</span></span>
    <span class="lives">❤️ <span id="livesDisplay">3</span></span>
  </div>
  <canvas id="game"></canvas>
  <div id="overlay">
    <h1>🎮 坦克大战</h1>
    <div class="subtitle">TANK BATTLE</div>
    <div class="info">
      <span class="key">W A S D</span> 移动 &nbsp; <span class="key">鼠标</span> 瞄准 &nbsp; <span class="key">左键</span> 射击<br>
      <span class="key">R</span> 重新装弹 &nbsp; <span class="key">空格</span> 暂停
    </div>
    <button class="btn" id="startBtn">开 始 游 戏</button>
  </div>
  <div class="controls-bar">
    <span><span class="k">WASD</span> 移动</span>
    <span><span class="k">🖱 鼠标</span> 瞄准</span>
    <span><span class="k">左键</span> 射击</span>
    <span><span class="k">R</span> 装弹</span>
  </div>
</div>

<script>
// ==================== 坦克大战 - Tank Battle ====================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 900, H = 600;
canvas.width = W; canvas.height = H;

// DOM elements
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const scoreDisplay = document.getElementById('scoreDisplay');
const levelDisplay = document.getElementById('levelDisplay');
const killsDisplay = document.getElementById('killsDisplay');
const livesDisplay = document.getElementById('livesDisplay');
const overlayTitle = overlay.querySelector('h1');
const overlaySub = overlay.querySelector('.subtitle');
const overlayInfo = overlay.querySelector('.info');

// Game state
let gameRunning = false;
let gamePaused = false;
let score = 0;
let kills = 0;
let level = 1;
let lives = 3;
let levelName = '';
let levelDesc = '';
let bossAlive = false;
let bossQueued = false;   // 普通敌人清光后，Boss 待出场
let bossQueuedHP = 0;
let player = null;
let enemies = [];
let bullets = [];
let particles = [];
let walls = [];
let powerUps = [];
let spawnTimer = 0;
let powerUpTimer = 0;
let shakeAmount = 0;
let keys = {};
let mouse = { x: W/2, y: H/2, down: false };

// Constants
const TILE = 40;
const PLAYER_SPEED = 3;
const ENEMY_SPEED = 0.8;
const BULLET_SPEED = 6;
const ENEMY_BULLET_SPEED = 4;
const ENEMY_BULLET_DAMAGE = 40;
const PLAYER_FIRE_RATE = 15; // frames
const ENEMY_FIRE_RATE = 90;
const MAX_ENEMIES = 6;
const POWERUP_DURATION = 600; // frames (10 sec)

// Boss constants
const BOSS_BASE_HP = 300;
const BOSS_HP_PER_LEVEL = 150;
const BOSS_DAMAGE = 60;
const BOSS_SPEED = 0.5;
const BOSS_SIZE = 1.6;   // scale factor
const BOSS_FIRE_RATE = 50;
const BOSS_BULLET_SPEED = 5;

// Player class
class Tank {
  constructor(x, y, color, isPlayer = false, isBoss = false) {
    this.x = x; this.y = y;
    this.isPlayer = isPlayer;
    this.isBoss = isBoss;
    this.color = color;
    this.alive = true;
    this.invincible = 0;

    // Size
    if (isBoss) {
      this.width = 34 * BOSS_SIZE;
      this.height = 34 * BOSS_SIZE;
    } else {
      this.width = 34;
      this.height = 34;
    }

    this.angle = isPlayer ? 0 : Math.random() * Math.PI * 2;
    this.speed = isPlayer ? PLAYER_SPEED : (isBoss ? BOSS_SPEED : ENEMY_SPEED);

    // Health & damage
    if (isPlayer) {
      this.health = 500;
      this.bulletDamage = 10;
    } else if (isBoss) {
      this.health = BOSS_BASE_HP + BOSS_HP_PER_LEVEL * (level - 1);
      this.bulletDamage = BOSS_DAMAGE;
    } else {
      this.health = 20 + level * 10;
      this.bulletDamage = ENEMY_BULLET_DAMAGE;
    }
    this.maxHealth = this.health;

    this.fireCooldown = 0;
    this.fireRate = isPlayer ? PLAYER_FIRE_RATE : (isBoss ? BOSS_FIRE_RATE : ENEMY_FIRE_RATE);

    // Power-ups (player only)
    this.speedBoost = 0;
    this.rapidFire = 0;
    this.shieldActive = 0;
    this.multiShot = 0;

    // AI
    this.aiDirChange = 0;
    this.aiTargetAngle = this.angle;
    this.aiStuck = 0;
    this.aiPrevX = x;
    this.aiPrevY = y;
    this.burstTimer = 0;
  }

  getBounds() {
    return {
      left: this.x - this.width/2,
      right: this.x + this.width/2,
      top: this.y - this.height/2,
      bottom: this.y + this.height/2
    };
  }

  collidesWith(other) {
    const a = this.getBounds();
    const b = other.getBounds();
    return !(a.right <= b.left || a.left >= b.right ||
             a.bottom <= b.top || a.top >= b.bottom);
  }

  collidesWithWall(wall) {
    const a = this.getBounds();
    const margin = 2;
    return !(a.right - margin <= wall.x || a.left + margin >= wall.x + wall.w ||
             a.bottom - margin <= wall.y || a.top + margin >= wall.y + wall.h);
  }

  move(dx, dy) {
    const effectiveSpeed = this.speed * (this.speedBoost > 0 ? 1.8 : 1);
    this.x += dx * effectiveSpeed;
    this.y += dy * effectiveSpeed;
    // Clamp to canvas
    this.x = Math.max(this.width/2, Math.min(W - this.width/2, this.x));
    this.y = Math.max(this.height/2, Math.min(H - this.height/2, this.y));
  }

  update() {
    if (this.fireCooldown > 0) this.fireCooldown--;
    if (this.invincible > 0) this.invincible--;
    if (this.speedBoost > 0) this.speedBoost--;
    if (this.rapidFire > 0) this.rapidFire--;
    if (this.shieldActive > 0) this.shieldActive--;
    if (this.multiShot > 0) this.multiShot--;
  }

  shoot() {
    const rate = this.rapidFire > 0 ? Math.floor(this.fireRate / 3) : this.fireRate;
    if (this.fireCooldown <= 0) {
      this.fireCooldown = rate;
      const baseAngle = this.angle;
      const dmg = this.bulletDamage;
      const spawnDist = this.isBoss ? 30 : 22;

      if (this.isBoss) {
        // Boss: 5 发扇形散射
        for (let i = -2; i <= 2; i++) {
          const a = baseAngle + i * 0.15;
          const bx = this.x + Math.cos(a) * spawnDist;
          const by = this.y + Math.sin(a) * spawnDist;
          const b = new Bullet(bx, by, a, false, dmg);
          b.speed = BOSS_BULLET_SPEED;
          if (i === 0) { b.radius = 6; }
          bullets.push(b);
        }
      } else if (this.multiShot > 0) {
        for (let off = -0.2; off <= 0.2; off += 0.2) {
          const a = baseAngle + off;
          const bx = this.x + Math.cos(a) * spawnDist;
          const by = this.y + Math.sin(a) * spawnDist;
          bullets.push(new Bullet(bx, by, a, true, dmg));
        }
      } else {
        const bx = this.x + Math.cos(baseAngle) * spawnDist;
        const by = this.y + Math.sin(baseAngle) * spawnDist;
        bullets.push(new Bullet(bx, by, baseAngle, this.isPlayer, dmg));
      }
    }
  }

  draw(ctx) {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);

    // Boss aura glow
    if (this.isBoss) {
      ctx.beginPath();
      ctx.arc(0, 0, this.width / 2 + 6, 0, Math.PI * 2);
      const auraAlpha = 0.1 + Math.sin(Date.now() / 200) * 0.05;
      ctx.fillStyle = `rgba(255, 50, 0, ${auraAlpha})`;
      ctx.fill();
    }

    // Shield effect
    if (this.shieldActive > 0) {
      ctx.beginPath();
      ctx.arc(0, 0, this.width / 2 + 4, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(0, 200, 255, ${0.5 + Math.sin(Date.now()/100)*0.3})`;
      ctx.lineWidth = 3;
      ctx.stroke();
    }

    // Invincible flicker
    if (this.invincible > 0 && Math.floor(this.invincible / 4) % 2 === 0) {
      ctx.globalAlpha = 0.5;
    }

    // Tank body
    const w = this.width / 2;
    const h = this.height / 2;

    // Tracks
    ctx.fillStyle = this.isBoss ? '#111' : '#1a1a1a';
    ctx.fillRect(-w, -h, 7, this.height);
    ctx.fillRect(w - 7, -h, 7, this.height);

    // Track details
    ctx.strokeStyle = this.isBoss ? '#222' : '#333';
    ctx.lineWidth = 1;
    for (let i = -h + 4; i < h; i += 6) {
      ctx.beginPath();
      ctx.moveTo(-w, i);
      ctx.lineTo(-w + 7, i);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(w - 7, i);
      ctx.lineTo(w, i);
      ctx.stroke();
    }

    // Body
    const bodyGrad = ctx.createLinearGradient(0, -h, 0, h);
    if (this.isPlayer) {
      bodyGrad.addColorStop(0, '#4a4');
      bodyGrad.addColorStop(0.5, '#2a2');
      bodyGrad.addColorStop(1, '#181');
    } else if (this.isBoss) {
      bodyGrad.addColorStop(0, '#d22');
      bodyGrad.addColorStop(0.5, '#600');
      bodyGrad.addColorStop(1, '#300');
    } else {
      bodyGrad.addColorStop(0, '#a44');
      bodyGrad.addColorStop(0.5, '#822');
      bodyGrad.addColorStop(1, '#511');
    }
    ctx.fillStyle = bodyGrad;
    ctx.fillRect(-w + 7, -h + 2, this.width - 14, this.height - 4);

    // Body border
    ctx.strokeStyle = this.isPlayer ? '#6c6' : (this.isBoss ? '#f44' : '#c66');
    ctx.lineWidth = this.isBoss ? 2.5 : 1.5;
    ctx.strokeRect(-w + 7, -h + 2, this.width - 14, this.height - 4);

    // Boss skull emblem
    if (this.isBoss) {
      ctx.fillStyle = '#fff';
      ctx.font = `${Math.floor(this.width * 0.4)}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('☠', 0, 0);
    }

    // Turret base
    const turretR = this.isBoss ? 16 : 10;
    ctx.fillStyle = this.isPlayer ? '#3a3' : (this.isBoss ? '#800' : '#933');
    ctx.beginPath();
    ctx.arc(0, 0, turretR, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = this.isPlayer ? '#5c5' : (this.isBoss ? '#f44' : '#c55');
    ctx.lineWidth = this.isBoss ? 2 : 1;
    ctx.stroke();

    // Barrel(s)
    const barrelLen = this.isBoss ? 28 : 18;
    const barrelW = this.isBoss ? 5 : 3;
    const barrelTip = this.isBoss ? 6 : 4;
    ctx.fillStyle = this.isPlayer ? '#2a2' : (this.isBoss ? '#500' : '#711');
    // Main barrel
    ctx.fillRect(-barrelW, -barrelLen, barrelW * 2, barrelLen);
    // Boss: double barrel
    if (this.isBoss) {
      ctx.fillRect(-barrelW - 7, -barrelLen + 4, barrelW * 2, barrelLen - 4);
      ctx.fillRect(barrelW + 3, -barrelLen + 4, barrelW * 2, barrelLen - 4);
    }
    // Barrel tip
    ctx.fillStyle = '#333';
    ctx.fillRect(-barrelW + 1, -barrelLen - 1, barrelW * 2 - 2, barrelTip);

    ctx.restore();

    // Health bar above tank
    if (!this.isPlayer && this.health < this.maxHealth) {
      const barW = this.isBoss ? 50 : 30;
      const barH = this.isBoss ? 6 : 4;
      const barY = this.y - this.height / 2 - (this.isBoss ? 14 : 10);
      ctx.fillStyle = '#333';
      ctx.fillRect(this.x - barW / 2, barY, barW, barH);
      const hpPct = this.health / this.maxHealth;
      ctx.fillStyle = hpPct > 0.5 ? '#0f0' : hpPct > 0.25 ? '#ff0' : '#f00';
      ctx.fillRect(this.x - barW / 2, barY, barW * hpPct, barH);
      ctx.strokeStyle = this.isBoss ? '#f44' : '#555';
      ctx.lineWidth = 1;
      ctx.strokeRect(this.x - barW / 2, barY, barW, barH);
      // Boss label
      if (this.isBoss) {
        ctx.fillStyle = '#f44';
        ctx.font = 'bold 10px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('BOSS', this.x, barY - 4);
      }
    }
  }
}

// Bullet class
class Bullet {
  constructor(x, y, angle, isPlayer, damage = null) {
    this.x = x;
    this.y = y;
    this.angle = angle;
    this.speed = isPlayer ? BULLET_SPEED : ENEMY_BULLET_SPEED;
    this.isPlayer = isPlayer;
    this.damage = damage || (isPlayer ? 10 : ENEMY_BULLET_DAMAGE);
    this.radius = 4;
    this.alive = true;
    this.trail = [];
  }

  update() {
    this.trail.push({ x: this.x, y: this.y, life: 5 });
    if (this.trail.length > 8) this.trail.shift();
    this.trail.forEach(t => t.life--);

    this.x += Math.cos(this.angle) * this.speed;
    this.y += Math.sin(this.angle) * this.speed;

    // Out of bounds
    if (this.x < 0 || this.x > W || this.y < 0 || this.y > H) {
      this.alive = false;
    }

    // Wall collision
    for (const wall of walls) {
      if (this.x > wall.x && this.x < wall.x + wall.w &&
          this.y > wall.y && this.y < wall.y + wall.h) {
        this.alive = false;
        if (wall.destructible) {
          wall.hp--;
          spawnExplosion(wall.x + wall.w/2, wall.y + wall.h/2, '#a80', 8);
          if (wall.hp <= 0) {
            wall.alive = false;
            spawnExplosion(wall.x + wall.w/2, wall.y + wall.h/2, '#f80', 15);
          }
        } else {
          spawnExplosion(this.x, this.y, '#ff0', 5);
        }
        break;
      }
    }
  }

  draw(ctx) {
    // Trail
    for (let i = 0; i < this.trail.length; i++) {
      const t = this.trail[i];
      const alpha = t.life / 5 * 0.5;
      ctx.beginPath();
      ctx.arc(t.x, t.y, this.radius * 0.6, 0, Math.PI * 2);
      ctx.fillStyle = this.isPlayer
        ? `rgba(255, 255, 100, ${alpha})`
        : `rgba(255, 100, 50, ${alpha})`;
      ctx.fill();
    }
    // Bullet
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fillStyle = this.isPlayer ? '#ff0' : '#f64';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.stroke();
  }
}

// Particle class
class Particle {
  constructor(x, y, color, size, vx, vy, life) {
    this.x = x; this.y = y;
    this.color = color;
    this.size = size;
    this.vx = vx;
    this.vy = vy;
    this.life = life;
    this.maxLife = life;
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.life--;
  }

  get alive() { return this.life > 0; }

  draw(ctx) {
    const alpha = this.life / this.maxLife;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * alpha, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${this.color}, ${alpha})`;
    ctx.fill();
  }
}

// Wall class
class Wall {
  constructor(x, y, w, h, destructible) {
    this.x = x; this.y = y;
    this.w = w; this.h = h;
    this.destructible = destructible;
    this.hp = destructible ? 2 : Infinity;
    this.alive = true;
  }

  draw(ctx) {
    if (!this.alive) return;
    if (this.destructible) {
      // Brick wall
      ctx.fillStyle = '#b44';
      ctx.fillRect(this.x, this.y, this.w, this.h);
      ctx.strokeStyle = '#633';
      ctx.lineWidth = 1;
      ctx.strokeRect(this.x, this.y, this.w, this.h);
      // Brick pattern
      const bw = TILE / 2, bh = TILE / 2;
      for (let bx = this.x; bx < this.x + this.w; bx += bw) {
        for (let by = this.y; by < this.y + this.h; by += bh) {
          ctx.strokeStyle = '#522';
          ctx.strokeRect(bx + 1, by + 1, bw - 2, bh - 2);
        }
      }
      // Damage cracks
      if (this.hp === 1) {
        ctx.strokeStyle = '#222';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(this.x + 3, this.y + 3);
        ctx.lineTo(this.x + this.w - 3, this.y + this.h - 3);
        ctx.moveTo(this.x + this.w - 3, this.y + 3);
        ctx.lineTo(this.x + 3, this.y + this.h - 3);
        ctx.stroke();
      }
    } else {
      // Steel wall
      ctx.fillStyle = '#667';
      ctx.fillRect(this.x, this.y, this.w, this.h);
      const grad = ctx.createLinearGradient(this.x, this.y, this.x + this.w, this.y + this.h);
      grad.addColorStop(0, '#889');
      grad.addColorStop(0.5, '#667');
      grad.addColorStop(1, '#445');
      ctx.fillStyle = grad;
      ctx.fillRect(this.x + 2, this.y + 2, this.w - 4, this.h - 4);
      // Rivets
      ctx.fillStyle = '#556';
      [[4,4],[this.w-8,4],[4,this.h-8],[this.w-8,this.h-8]].forEach(([rx, ry]) => {
        ctx.beginPath();
        ctx.arc(this.x + rx, this.y + ry, 2.5, 0, Math.PI * 2);
        ctx.fill();
      });
    }
  }
}

// PowerUp class
class PowerUp {
  constructor(x, y, type) {
    this.x = x; this.y = y;
    this.type = type; // 'speed', 'rapid', 'shield', 'multi', 'health'
    this.radius = 14;
    this.alive = true;
    this.bobOffset = 0;
    this.glowPhase = Math.random() * Math.PI * 2;
  }

  update() {
    this.bobOffset = Math.sin(Date.now() / 300 + this.glowPhase) * 3;
    this.glowPhase += 0.03;
  }

  draw(ctx) {
    const y = this.y + this.bobOffset;
    // Glow
    const glowAlpha = 0.2 + Math.sin(this.glowPhase) * 0.1;
    ctx.beginPath();
    ctx.arc(this.x, y, this.radius + 5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 255, 200, ${glowAlpha})`;
    ctx.fill();

    // Icon background
    ctx.beginPath();
    ctx.arc(this.x, y, this.radius, 0, Math.PI * 2);

    const colors = {
      speed: '#0ff', rapid: '#f80', shield: '#08f',
      multi: '#f0f', health: '#f44'
    };
    ctx.fillStyle = colors[this.type];
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Icon
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 14px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const icons = {
      speed: '⚡', rapid: '🔥', shield: '🛡',
      multi: '💥', health: '❤'
    };
    ctx.fillText(icons[this.type], this.x, y + 1);
  }
}

// Helper functions
function spawnExplosion(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 0.5 + Math.random() * 3;
    const size = 2 + Math.random() * 4;
    const life = 15 + Math.random() * 25;
    particles.push(new Particle(x, y, color, size,
      Math.cos(angle) * speed, Math.sin(angle) * speed, life));
  }
  shakeAmount = Math.max(shakeAmount, count * 0.3);
}

function rectCollide(a, b) {
  return !(a.right <= b.x || a.left >= b.x + b.w ||
           a.bottom <= b.y || a.top >= b.y + b.h);
}

      addWall(5, 11, TILE, TILE, true);

function addWall(gx, gy, w, h, destructible) {
  // gx, gy 是网格坐标，w, h 是像素尺寸（0 表示自动 TILE）
  const bw = 10;
  const x = gx * TILE + TILE / 2;
  const y = gy * TILE + TILE / 2 + bw;
  const pw = w || TILE;
  const ph = h || TILE;
  walls.push(new Wall(x - pw / 2, y - ph / 2, pw, ph, destructible));
}

function generateLevel(lvl) {
  walls = [];
  enemies = [];
  bullets = [];
  particles = [];
  powerUps = [];

  // Border walls (indestructible)
  const bw = 10;
  walls.push(new Wall(0, 0, W, bw, false));
  walls.push(new Wall(0, H - bw, W, bw, false));
  walls.push(new Wall(0, 0, bw, H, false));
  walls.push(new Wall(W - bw, 0, bw, H, false));

  // 根据关卡索引选地图（3 张地图循环）
  const def = LEVEL_DEFS[(lvl - 1) % LEVEL_DEFS.length];
  def.buildWalls();

  // 显示关卡名
  levelName = def.name;
  levelDesc = def.desc;

  // 生成普通敌人
  for (let i = 0; i < def.enemyCount; i++) {
    spawnEnemy();
  }

  // Boss 先不入场 — 等普通敌人清光后再出
  const scaledBossHP = BOSS_BASE_HP + BOSS_HP_PER_LEVEL * (lvl - 1);
  bossQueued = true;
  bossQueuedHP = scaledBossHP;
  bossAlive = false;

  // Clear player bullets
  bullets = bullets.filter(b => !b.isPlayer);
}

function spawnEnemy() {
  const side = randomSpawnPos();
  const enemy = new Tank(side.x, side.y, '#c33', false, false);
  enemies.push(enemy);
}

function randomSpawnPos() {
  const sides = [
    { x: TILE * 2, y: TILE * 2 + Math.random() * (H - TILE * 4) },
    { x: W - TILE * 2, y: TILE * 2 + Math.random() * (H - TILE * 4) },
    { x: TILE * 2 + Math.random() * (W - TILE * 4), y: TILE * 3 },
    { x: TILE * 2 + Math.random() * (W - TILE * 4), y: H - TILE * 3 },
  ];
  let pos = sides[Math.floor(Math.random() * sides.length)];
  // 远离玩家
  if (player && Math.hypot(pos.x - player.x, pos.y - player.y) < 200) {
    pos = sides[Math.floor(Math.random() * sides.length)];
  }
  return pos;
}

function spawnBoss(hp) {
  const pos = randomSpawnPos();
  const boss = new Tank(pos.x, pos.y, '#d22', false, true);
  boss.health = hp;
  boss.maxHealth = hp;
  boss.tag = 'boss';
  enemies.push(boss);
}

function spawnPowerUp() {
  const types = ['speed', 'rapid', 'shield', 'multi', 'health'];
  // Find an open spot
  for (let attempt = 0; attempt < 20; attempt++) {
    const x = TILE * 2 + Math.random() * (W - TILE * 4);
    const y = TILE * 3 + Math.random() * (H - TILE * 5);
    let blocked = false;
    for (const wall of walls) {
      if (wall.alive && x > wall.x - 20 && x < wall.x + wall.w + 20 &&
          y > wall.y - 20 && y < wall.y + wall.h + 20) {
        blocked = true;
        break;
      }
    }
    if (!blocked) {
      const type = types[Math.floor(Math.random() * types.length)];
      powerUps.push(new PowerUp(x, y, type));
      return;
    }
  }
}

function resetGame() {
  score = 0;
  kills = 0;
  level = 1;
  lives = 3;
  bossQueued = false;
  bossAlive = false;
  updateUI();
  player = new Tank(W/2, H/2, '#2a2', true);
  generateLevel(level);
  gameRunning = true;
  gamePaused = false;
  overlay.classList.add('hidden');
}

function playerHit() {
  // 只在血量归零时调用，处理扣命 + 重生
  lives--;
  updateUI();
  spawnExplosion(player.x, player.y, '#4f4', 25);
  shakeAmount = 10;

  if (lives <= 0) {
    gameOver();
  } else {
    // Respawn with full health + invincibility
    player.health = player.maxHealth;
    player.invincible = 180; // 3 秒无敌
    player.x = W/2;
    player.y = H/2;
    player.speedBoost = 0;
    player.rapidFire = 0;
    player.shieldActive = 0;
    player.multiShot = 0;
  }
}

function gameOver() {
  gameRunning = false;
  overlay.classList.remove('hidden');
  overlayTitle.textContent = '💀 游戏结束';
  overlayTitle.className = 'gameover-title';
  overlaySub.textContent = `最终得分: ${score} | 击杀: ${kills} | 关卡: ${level}`;
  overlayInfo.innerHTML = '胜败乃兵家常事，请重新再来！';
  startBtn.textContent = '再 来 一 局';
}

function nextLevel() {
  level++;
  updateUI();
  player.x = W/2;
  player.y = H/2;
  player.health = player.maxHealth;
  player.invincible = 60;
  player.speedBoost = 0;
  player.rapidFire = 0;
  player.shieldActive = 0;
  player.multiShot = 0;
  generateLevel(level);

  // Bonus life every 3 levels
  if (level % 3 === 0) {
    lives = Math.min(lives + 1, 5);
    updateUI();
  }
}

function updateUI() {
  scoreDisplay.textContent = score;
  levelDisplay.textContent = level;
  killsDisplay.textContent = kills;
  livesDisplay.textContent = '❤'.repeat(lives);
}

// ========== AI ==========
function commonAIMove(enemy, preferredDist) {
  // 轻量碰撞检测：检查移动后是否撞墙
  const hw = enemy.width / 2;
  const hh = enemy.height / 2;
  function tryMove(dx, dy) {
    const nx = enemy.x + dx, ny = enemy.y + dy;
    for (const wall of walls) {
      if (!wall.alive) continue;
      if (nx - hw < wall.x + wall.w && nx + hw > wall.x &&
          ny - hh < wall.y + wall.h && ny + hh > wall.y) return false;
    }
    return true;
  }

  const dx = player.x - enemy.x;
  const dy = player.y - enemy.y;
  const dist = Math.hypot(dx, dy);

  // 平滑转向
  enemy.aiTargetAngle = Math.atan2(dy, dx);
  let angleDiff = enemy.aiTargetAngle - enemy.angle;
  while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
  while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
  const turnRate = enemy.isBoss ? 0.05 : 0.08;
  enemy.angle += angleDiff * turnRate;

  const effectiveDist = preferredDist || (enemy.isBoss ? 250 : 200);

  if (dist > effectiveDist) {
    // 向玩家靠近
    const mx = Math.cos(enemy.angle) * enemy.speed;
    const my = Math.sin(enemy.angle) * enemy.speed;
    if (tryMove(mx, 0)) enemy.x += mx;
    if (tryMove(0, my)) enemy.y += my;
  } else if (dist < effectiveDist * 0.5) {
    // 太近，横向移动
    const strafe = enemy.angle + Math.PI / 2;
    const sx = Math.cos(strafe) * enemy.speed * 0.7;
    const sy = Math.sin(strafe) * enemy.speed * 0.7;
    if (tryMove(sx, 0)) enemy.x += sx;
    if (tryMove(0, sy)) enemy.y += sy;
  }

  // 边界
  enemy.x = Math.max(enemy.width / 2, Math.min(W - enemy.width / 2, enemy.x));
  enemy.y = Math.max(enemy.height / 2, Math.min(H - enemy.height / 2, enemy.y));

  // 防卡死
  if (Math.abs(enemy.x - enemy.aiPrevX) < 0.3 && Math.abs(enemy.y - enemy.aiPrevY) < 0.3) {
    enemy.aiStuck++;
  } else {
    enemy.aiStuck = 0;
  }
  enemy.aiPrevX = enemy.x;
  enemy.aiPrevY = enemy.y;
  if (enemy.aiStuck > 30) {
    enemy.angle += (Math.random() - 0.5) * 1.5;
    enemy.aiStuck = 0;
  }

  return { dx, dy, dist, angleDiff };
}

function updateAI(enemy) {
  if (!player || !player.alive) return;

  const { dist, angleDiff } = commonAIMove(enemy);

  if (enemy.isBoss) {
    // Boss AI: 持续散射射击
    const facingDiff = Math.abs(angleDiff);
    if (facingDiff < 0.4) {
      enemy.shoot();
    }
    // 周期性爆发（连续 3 轮快速射击）
    enemy.burstTimer = (enemy.burstTimer || 0) + 1;
    if (enemy.burstTimer > 120) {
      enemy.burstTimer = 0;
      enemy.fireCooldown = 0; // 立刻重置冷却
      enemy.shoot();
    }
  } else {
    // 普通敌人
    const facingDiff = Math.abs(angleDiff);
    if (facingDiff < 0.3 && dist < 500) {
      enemy.shoot();
    }
    if (Math.random() < 0.005 && dist < 400) {
      enemy.shoot();
    }
  }
}

// ==================== MAIN GAME LOOP ====================
function update() {
  if (!gameRunning || gamePaused) return;

  // Update player
  if (player && player.alive) {
    let dx = 0, dy = 0;
    if (keys['w'] || keys['arrowup']) dy = -1;
    if (keys['s'] || keys['arrowdown']) dy = 1;
    if (keys['a'] || keys['arrowleft']) dx = -1;
    if (keys['d'] || keys['arrowright']) dx = 1;

    if (dx !== 0 || dy !== 0) {
      const len = Math.hypot(dx, dy);
      dx /= len;
      dy /= len;
      const spd = player.speed * (player.speedBoost > 0 ? 1.8 : 1);
      const hw = player.width / 2;
      const hh = player.height / 2;

      // X 轴移动
      const testX = player.x + dx * spd;
      let blockedX = false;
      for (const wall of walls) {
        if (!wall.alive) continue;
        if (testX - hw < wall.x + wall.w && testX + hw > wall.x &&
            player.y - hh < wall.y + wall.h && player.y + hh > wall.y) {
          blockedX = true; break;
        }
      }
      if (!blockedX) player.x = testX;

      // Y 轴移动
      const testY = player.y + dy * spd;
      let blockedY = false;
      for (const wall of walls) {
        if (!wall.alive) continue;
        if (player.x - hw < wall.x + wall.w && player.x + hw > wall.x &&
            testY - hh < wall.y + wall.h && testY + hh > wall.y) {
          blockedY = true; break;
        }
      }
      if (!blockedY) player.y = testY;
    }

    // Clamp player
    player.x = Math.max(player.width/2, Math.min(W - player.width/2, player.x));
    player.y = Math.max(player.height/2, Math.min(H - player.height/2, player.y));

    // Aim at mouse
    player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);

    // Shooting
    if (mouse.down) {
      player.shoot();
    }

    player.update();

    // PowerUp collection
    for (const pu of powerUps) {
      if (!pu.alive) continue;
      const d = Math.hypot(player.x - pu.x, player.y - (pu.y + pu.bobOffset));
      if (d < player.width/2 + pu.radius) {
        pu.alive = false;
        spawnExplosion(pu.x, pu.y, '#ff0', 8);
        switch (pu.type) {
          case 'speed':
            player.speedBoost = POWERUP_DURATION;
            break;
          case 'rapid':
            player.rapidFire = POWERUP_DURATION;
            break;
          case 'shield':
            player.shieldActive = POWERUP_DURATION;
            break;
          case 'multi':
            player.multiShot = POWERUP_DURATION;
            break;
          case 'health':
            player.health = Math.min(player.health + 150, player.maxHealth);
            break;
        }
      }
    }
  }

  // Update enemies
  for (const enemy of enemies) {
    if (!enemy.alive) continue;
    updateAI(enemy);
    enemy.update();
  }

  // Update bullets
  for (const bullet of bullets) {
    if (!bullet.alive) continue;
    bullet.update();

    if (!bullet.alive) continue;

    // Bullet-tank collision
    if (bullet.isPlayer) {
      // Player bullets vs enemies
      for (const enemy of enemies) {
        if (!enemy.alive) continue;
        const d = Math.hypot(bullet.x - enemy.x, bullet.y - enemy.y);
        if (d < enemy.width/2 + bullet.radius) {
          bullet.alive = false;
          enemy.health -= bullet.damage || 10;
          spawnExplosion(bullet.x, bullet.y, '#f80', 4);
          if (enemy.health <= 0) {
            enemy.alive = false;
            const isBoss = enemy.isBoss;
            const boomSize = isBoss ? 50 : 25;
            const boomColor = isBoss ? '#f80' : '#f44';
            spawnExplosion(enemy.x, enemy.y, boomColor, boomSize);
            score += isBoss ? (1000 * level) : (100 * level);
            kills += isBoss ? 5 : 1;
            updateUI();
            shakeAmount = Math.max(shakeAmount, isBoss ? 15 : 4);
          }
          break;
        }
      }
    } else {
      // Enemy bullets vs player
      if (player && player.alive && player.invincible <= 0) {
        const d = Math.hypot(bullet.x - player.x, bullet.y - player.y);
        if (d < player.width/2 + bullet.radius) {
          bullet.alive = false;
          if (player.shieldActive > 0) {
            // 护盾完全格挡伤害
            spawnExplosion(bullet.x, bullet.y, '#0cf', 8);
          } else {
            // 扣血量 = 子弹携带的伤害（由射击者决定）
            const dmg = bullet.damage || ENEMY_BULLET_DAMAGE;
            player.health -= dmg;
            spawnExplosion(bullet.x, bullet.y, '#f44', dmg > 50 ? 12 : 6);
            shakeAmount = Math.max(shakeAmount, dmg > 50 ? 6 : 3);
            player.invincible = 10; // 短暂无敌防连击
            if (player.health <= 0) {
              playerHit();
            }
          }
        }
      }
    }
  }

  // Clean up dead entities
  bullets = bullets.filter(b => b.alive);
  particles = particles.filter(p => p.alive);
  enemies = enemies.filter(e => e.alive);
  powerUps = powerUps.filter(p => p.alive);
  walls = walls.filter(w => w.alive);

  // Update particles
  for (const p of particles) p.update();
  for (const pu of powerUps) pu.update();

  // Spawn timer
  spawnTimer--;
  if (!bossQueued && !bossAlive) {
    // 正常增援（boss 未出场时）
    const regularCount = enemies.filter(e => !e.isBoss).length;
    if (spawnTimer <= 0 && regularCount < MAX_ENEMIES) {
      spawnEnemy();
      spawnTimer = 180 + Math.random() * 180;
    }
  }

  // Boss 出场：普通敌人清光后召唤 Boss
  if (bossQueued && enemies.filter(e => !e.isBoss).length === 0) {
    bossQueued = false;
    spawnBoss(bossQueuedHP);
    bossAlive = true;
    // 出场特效
    const boss = enemies[enemies.length - 1];
    if (boss) {
      spawnExplosion(boss.x, boss.y, '#f80', 30);
      shakeAmount = 12;
    }
  }

  // 更新 boss 存活状态
  if (!bossQueued) {
    bossAlive = enemies.some(e => e.isBoss && e.alive);
  }

  // PowerUp timer
  powerUpTimer--;
  if (powerUpTimer <= 0 && powerUps.length < 3) {
    spawnPowerUp();
    powerUpTimer = 300 + Math.random() * 300;
  }

  // Check level complete: all enemies dead + boss not queued/not alive
  if (enemies.length === 0 && !bossQueued && !bossAlive) {
    score += 500 * level;
    updateUI();
    nextLevel();
    spawnTimer = 120;
  }

  // Screen shake decay
  if (shakeAmount > 0) {
    shakeAmount *= 0.85;
    if (shakeAmount < 0.1) shakeAmount = 0;
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Apply screen shake
  ctx.save();
  if (shakeAmount > 0) {
    const sx = (Math.random() - 0.5) * shakeAmount * 2;
    const sy = (Math.random() - 0.5) * shakeAmount * 2;
    ctx.translate(sx, sy);
  }

  // Background grid
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = '#1f1f1f';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += TILE) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, H);
    ctx.stroke();
  }
  for (let y = 0; y < H; y += TILE) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }

  // Level name tag
  if (levelName && gameRunning) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(W / 2 - 90, 16, 180, 24);
    ctx.strokeStyle = '#444';
    ctx.lineWidth = 1;
    ctx.strokeRect(W / 2 - 90, 16, 180, 24);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 13px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(`第 ${level} 关 · ${levelName}`, W / 2, 33);
  }

  // Boss incoming warning
  if (bossQueued && gameRunning) {
    const alpha = 0.5 + Math.sin(Date.now() / 200) * 0.3;
    ctx.fillStyle = `rgba(255, 50, 0, ${alpha})`;
    ctx.font = 'bold 22px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('⚠ BOSS 即将登场！⚠', W / 2, 75);
  }

  // Boss HP bar at top
  if (bossAlive && gameRunning) {
    const boss = enemies.find(e => e.isBoss && e.alive);
    if (boss) {
      const bbx = W / 2 - 150, bby = 44, bbw = 300, bbh = 10;
      // 背景
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(bbx - 2, bby - 2, bbw + 4, bbh + 4);
      // 血量槽
      ctx.fillStyle = '#300';
      ctx.fillRect(bbx, bby, bbw, bbh);
      const pct = boss.health / boss.maxHealth;
      const grad = ctx.createLinearGradient(bbx, 0, bbx + bbw, 0);
      grad.addColorStop(0, '#f00');
      grad.addColorStop(0.5, '#f80');
      grad.addColorStop(1, '#f00');
      ctx.fillStyle = grad;
      ctx.fillRect(bbx, bby, bbw * pct, bbh);
      // 边框
      ctx.strokeStyle = '#f44';
      ctx.lineWidth = 2;
      ctx.strokeRect(bbx - 2, bby - 2, bbw + 4, bbh + 4);
      // 标签
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 10px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(`☠ BOSS  ${Math.ceil(boss.health)} / ${boss.maxHealth}`, W / 2, bby - 4);
    }
  }

  // Draw walls
  for (const wall of walls) {
    if (wall.alive) wall.draw(ctx);
  }

  // Draw power-ups
  for (const pu of powerUps) {
    if (pu.alive) pu.draw(ctx);
  }

  // Draw bullets
  for (const bullet of bullets) {
    if (bullet.alive) bullet.draw(ctx);
  }

  // Draw enemies
  for (const enemy of enemies) {
    if (enemy.alive) enemy.draw(ctx);
  }

  // Draw player
  if (player && player.alive) {
    player.draw(ctx);

    // 分段血量条 — 5 格，每格 100 血
    const totalChunks = 5;
    const chunkW = 10, chunkH = 7, gap = 2;
    const totalW = totalChunks * chunkW + (totalChunks - 1) * gap;
    const barX = player.x - totalW / 2;
    const barY = player.y - player.height / 2 - 12;
    const hpPerChunk = player.maxHealth / totalChunks;

    for (let i = 0; i < totalChunks; i++) {
      const cx = barX + i * (chunkW + gap);
      const chunkHp = Math.max(0, Math.min(1, (player.health - i * hpPerChunk) / hpPerChunk));

      // 背景（空血）
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(cx, barY, chunkW, chunkH);

      // 血量填充
      if (chunkHp > 0) {
        if (chunkHp >= 1) {
          ctx.fillStyle = '#0f0';
        } else if (chunkHp > 0.5) {
          ctx.fillStyle = '#8f0';
        } else {
          ctx.fillStyle = '#f80';
        }
        ctx.fillRect(cx, barY, chunkW * chunkHp, chunkH);
      }

      // 边框
      ctx.strokeStyle = '#444';
      ctx.lineWidth = 1;
      ctx.strokeRect(cx, barY, chunkW, chunkH);
    }

    // Active power-up indicators
    let indicatorY = barY - 18;
    const indicators = [];
    if (player.speedBoost > 0) indicators.push({ icon: '⚡', color: '#0ff', time: player.speedBoost });
    if (player.rapidFire > 0) indicators.push({ icon: '🔥', color: '#f80', time: player.rapidFire });
    if (player.shieldActive > 0) indicators.push({ icon: '🛡', color: '#08f', time: player.shieldActive });
    if (player.multiShot > 0) indicators.push({ icon: '💥', color: '#f0f', time: player.multiShot });

    ctx.font = '11px Arial';
    ctx.textAlign = 'center';
    for (const ind of indicators) {
      const secs = Math.ceil(ind.time / 60);
      ctx.fillText(`${ind.icon}${secs}s`, player.x, indicatorY);
      indicatorY -= 16;
    }
  }

  // Draw particles
  for (const p of particles) {
    if (p.alive) p.draw(ctx);
  }

  ctx.restore();

  // Crosshair
  if (player && player.alive && gameRunning) {
    ctx.save();
    ctx.translate(mouse.x, mouse.y);
    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
    ctx.lineWidth = 1;
    const ch = 12;
    ctx.beginPath(); ctx.moveTo(0, -ch); ctx.lineTo(0, -4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, 4); ctx.lineTo(0, ch); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-ch, 0); ctx.lineTo(-4, 0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(4, 0); ctx.lineTo(ch, 0); ctx.stroke();
    ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI * 2); ctx.stroke();
    ctx.restore();
  }

  // Pause overlay
  if (gamePaused && gameRunning) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 36px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('⏸ 已暂停', W/2, H/2);
    ctx.font = '16px Arial';
    ctx.fillText('按空格键继续', W/2, H/2 + 35);
  }

  // Mini-map
  const mmW = 120, mmH = 80, mmX = W - mmW - 15, mmY = 15;
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(mmX, mmY, mmW, mmH);
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 1;
  ctx.strokeRect(mmX, mmY, mmW, mmH);

  const scaleX = mmW / W, scaleY = mmH / H;

  // Walls on minimap
  for (const wall of walls) {
    if (!wall.alive) continue;
    ctx.fillStyle = wall.destructible ? '#a44' : '#667';
    ctx.fillRect(mmX + wall.x * scaleX, mmY + wall.y * scaleY,
      Math.max(wall.w * scaleX, 1), Math.max(wall.h * scaleY, 1));
  }

  // PowerUps on minimap
  for (const pu of powerUps) {
    if (!pu.alive) continue;
    ctx.fillStyle = '#ff0';
    ctx.fillRect(mmX + pu.x * scaleX - 1, mmY + pu.y * scaleY - 1, 2, 2);
  }

  // Enemies on minimap
  for (const enemy of enemies) {
    if (!enemy.alive) continue;
    ctx.fillStyle = '#f44';
    ctx.fillRect(mmX + enemy.x * scaleX - 1.5, mmY + enemy.y * scaleY - 1.5, 3, 3);
  }

  // Player on minimap
  if (player && player.alive) {
    ctx.fillStyle = '#0f0';
    ctx.fillRect(mmX + player.x * scaleX - 2, mmY + player.y * scaleY - 2, 4, 4);
  }

  // Minimap label
  ctx.fillStyle = '#555';
  ctx.font = '9px Arial';
  ctx.textAlign = 'left';
  ctx.fillText('MAP', mmX + 3, mmY + 10);
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// ==================== EVENT HANDLERS ====================
window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;

  if (e.key.toLowerCase() === ' ' || e.code === 'Space') {
    e.preventDefault();
    if (gameRunning) {
      gamePaused = !gamePaused;
    }
  }

  if (e.key.toLowerCase() === 'r') {
    if (player && player.alive) {
      player.fireCooldown = Math.max(0, player.fireCooldown - 5);
    }
  }
});

window.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
});

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  mouse.x = (e.clientX - rect.left) * scaleX;
  mouse.y = (e.clientY - rect.top) * scaleY;
});

canvas.addEventListener('mousedown', e => {
  if (e.button === 0) mouse.down = true;
});

canvas.addEventListener('mouseup', e => {
  if (e.button === 0) mouse.down = false;
});

canvas.addEventListener('contextmenu', e => e.preventDefault());

// Touch support
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  mouse.x = (e.touches[0].clientX - rect.left) * scaleX;
  mouse.y = (e.touches[0].clientY - rect.top) * scaleY;
}, { passive: false });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  mouse.down = true;
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  mouse.x = (e.touches[0].clientX - rect.left) * scaleX;
  mouse.y = (e.touches[0].clientY - rect.top) * scaleY;
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  mouse.down = false;
});

startBtn.addEventListener('click', () => {
  resetGame();
  if (startBtn.textContent.includes('再来')) {
    overlayTitle.textContent = '🎮 坦克大战';
    overlayTitle.className = '';
    overlaySub.textContent = 'TANK BATTLE';
    overlayInfo.innerHTML = '<span class="key">W A S D</span> 移动 &nbsp; <span class="key">鼠标</span> 瞄准 &nbsp; <span class="key">左键</span> 射击<br><span class="key">R</span> 重新装弹 &nbsp; <span class="key">空格</span> 暂停';
    startBtn.textContent = '开 始 游 戏';
  }
});

// Initialize
player = new Tank(W/2, H/2, '#2a2', true);
generateLevel(level);

// Start game loop
gameLoop();
</script>
